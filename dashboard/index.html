<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Options Analytics Dashboard</title>

    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        dark: '#0b1120',
                        card: '#1e293b',
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <style>
        body {
            background-color: theme('colors.dark');
            color: #f8fafc;
        }

        .tabular-data {
            font-variant-numeric: tabular-nums;
        }

        /* Pulse animation for alert rows */
        .alert-row {
            animation: alertPulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            border-left: 4px solid theme('colors.red.500');
        }

        @keyframes alertPulse {

            0%,
            100% {
                background-color: rgba(239, 68, 68, 0.05);
            }

            50% {
                background-color: rgba(239, 68, 68, 0.2);
            }
        }

        /* Subtle transitions */
        tbody tr {
            transition: background-color 0.2s ease, border-left 0.2s ease;
            border-left: 4px solid transparent;
        }

        tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: theme('colors.dark');
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>

<body class="antialiased h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-card border-b border-slate-700/50 py-4 px-6 flex items-center justify-between shrink-0">
        <div class="flex items-center space-x-3">
            <div
                class="h-8 w-8 rounded-lg bg-indigo-500/20 flex items-center justify-center border border-indigo-500/30">
                <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                </svg>
            </div>
            <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
                Options Live Analytics
            </h1>
        </div>

        <div class="flex items-center space-x-6">
            <div class="text-sm font-medium text-slate-400 flex items-center">
                <span class="relative flex h-3 w-3 mr-2">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                LIVE <span id="clock" class="ml-2 tabular-data">--:--:--</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-auto p-6">
        <div class="max-w-7xl mx-auto space-y-6">

            <!-- Stats overview cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-card rounded-xl p-5 border border-slate-700/50 shadow-lg shadow-black/20">
                    <div class="text-sm text-slate-400 font-medium mb-1">Total Monitored</div>
                    <div class="text-2xl font-bold tabular-data" id="stat-total">0</div>
                </div>
                <div class="bg-card rounded-xl p-5 border border-slate-700/50 shadow-lg shadow-black/20">
                    <div class="text-sm text-slate-400 font-medium mb-1">Total Calls Volume</div>
                    <div class="text-2xl font-bold tabular-data text-emerald-400" id="stat-calls">0</div>
                </div>
                <div class="bg-card rounded-xl p-5 border border-slate-700/50 shadow-lg shadow-black/20">
                    <div class="text-sm text-slate-400 font-medium mb-1">Total Puts Volume</div>
                    <div class="text-2xl font-bold tabular-data text-rose-400" id="stat-puts">0</div>
                </div>
                <div class="bg-card rounded-xl p-5 border border-slate-700/50 shadow-lg shadow-black/20">
                    <div class="text-sm text-slate-400 font-medium mb-1">Alerts Today</div>
                    <div class="text-2xl font-bold tabular-data text-amber-400" id="stat-alerts">0</div>
                </div>
            </div>

            <!-- Table Container -->
            <div class="bg-card rounded-xl border border-slate-700/50 shadow-xl overflow-hidden flex flex-col">
                <div class="px-6 py-4 border-b border-slate-700/50 flex justify-between items-center bg-slate-800/50">
                    <h2 class="text-lg font-semibold text-white flex items-center">
                        <svg class="w-5 h-5 mr-2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                        Live EOD Totals (ATM ±10)
                    </h2>

                    <div class="relative">
                        <svg class="w-4 h-4 absolute left-3 top-2.5 text-slate-400" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                        <input type="text" id="searchInput" placeholder="Search symbol..."
                            class="bg-slate-900 border border-slate-700 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full pl-9 p-2 text-white placeholder-slate-400">
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="text-xs text-slate-400 uppercase bg-slate-800/80 sticky top-0 z-10">
                            <tr>
                                <th scope="col" class="px-6 py-3 font-semibold cursor-pointer hover:text-white"
                                    onclick="sortTable('symbol')">Stock <span class="text-slate-500 ml-1">↓</span></th>
                                <th scope="col" class="px-6 py-3 font-semibold text-right text-slate-400">Prev Day Calls
                                </th>
                                <th scope="col"
                                    class="px-6 py-3 font-semibold text-right cursor-pointer hover:text-white"
                                    onclick="sortTable('call_volume')">Live Calls <span
                                        class="text-slate-500 ml-1">↕</span></th>
                                <th scope="col" class="px-6 py-3 font-semibold text-right text-slate-400">Prev Day Puts
                                </th>
                                <th scope="col"
                                    class="px-6 py-3 font-semibold text-right cursor-pointer hover:text-white"
                                    onclick="sortTable('put_volume')">Live Puts <span
                                        class="text-slate-500 ml-1">↕</span></th>
                                <th scope="col"
                                    class="px-6 py-3 font-semibold text-right cursor-pointer hover:text-white"
                                    onclick="sortTable('alert')">Alert Status <span class="text-slate-500 ml-1">↕</span>
                                </th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody" class="divide-y divide-slate-800/50">
                            <!-- Rows will be populated by JS -->
                            <tr>
                                <td colspan="4" class="px-6 py-10 text-center text-slate-500">
                                    <svg class="animate-spin h-8 w-8 mx-auto text-indigo-500 mb-3"
                                        xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                            stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor"
                                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                        </path>
                                    </svg>
                                    Connecting to live data...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        // API Base configuration — works on both localhost and production domain
        const API_BASE = window.location.origin + '/api';

        // Application State
        let liveVolumes = [];
        let alertsMap = new Map(); // Key: Symbol, Value: Alert message
        let eodVolumesMap = new Map(); // Key: Symbol, Value: {call_volume_total, put_volume_total}
        let eodLoaded = false;
        let sortColumn = 'symbol';
        let sortAsc = true;

        // Format numbers visually (1,500,000)
        const formatNum = (num) => new Intl.NumberFormat('en-IN').format(num || 0);

        // Update live clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: false });
        }, 1000);

        // Sorting logic
        window.sortTable = (col) => {
            if (sortColumn === col) {
                sortAsc = !sortAsc;
            } else {
                sortColumn = col;
                // Defaults: string goes desc first for some reason? Let's make text asc default, numbers desc default
                sortAsc = col === 'symbol' ? true : false;
            }
            renderTable();
        };

        const INDICES = ["NIFTY", "BANKNIFTY", "FINNIFTY", "MIDCPNIFTY", "SENSEX"];

        const sortData = (data) => {
            return [...data].sort((a, b) => {
                let valA, valB;

                if (sortColumn === 'symbol') {
                    const aIsIndex = INDICES.includes(a.symbol);
                    const bIsIndex = INDICES.includes(b.symbol);

                    if (aIsIndex && !bIsIndex) return sortAsc ? -1 : 1;
                    if (!aIsIndex && bIsIndex) return sortAsc ? 1 : -1;

                    valA = a.symbol;
                    valB = b.symbol;
                } else if (sortColumn === 'call_volume') {
                    valA = a.call_volume;
                    valB = b.call_volume;
                } else if (sortColumn === 'put_volume') {
                    valA = a.put_volume;
                    valB = b.put_volume;
                } else if (sortColumn === 'alert') {
                    valA = alertsMap.has(a.symbol) ? 1 : 0;
                    valB = alertsMap.has(b.symbol) ? 1 : 0;
                }

                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });
        };

        // Fetch Data from Server
        async function fetchAnalytics() {
            try {
                // Fetch EOD Data once
                if (!eodLoaded) {
                    try {
                        const eodRes = await fetch(`${API_BASE}/eod-volumes`);
                        if (eodRes.ok) {
                            const eodJson = await eodRes.json();
                            if (eodJson.data) {
                                eodJson.data.forEach(item => {
                                    eodVolumesMap.set(item.symbol, {
                                        call: item.call_volume_total || 0,
                                        put: item.put_volume_total || 0
                                    });
                                });
                            }
                        }
                        eodLoaded = true;
                    } catch (eodErr) {
                        console.warn("Could not load EOD data", eodErr);
                    }
                }

                // Fetch both concurrently
                const [volRes, alertRes] = await Promise.all([
                    fetch(`${API_BASE}/live-volumes`),
                    fetch(`${API_BASE}/alerts`)
                ]);

                if (!volRes.ok) throw new Error("Volume API Failed");

                const volData = await volRes.json();
                const alertData = alertRes.ok ? await alertRes.json() : { data: [] };

                // Map alerts for quick lookup
                alertsMap.clear();
                if (alertData.data) {
                    alertData.data.forEach(alert => {
                        // Store the most recent alert for a symbol, or join messages
                        // We use the alert message to display on the table
                        let existing = alertsMap.get(alert.symbol);
                        if (existing) {
                            if (!existing.includes(alert.alert_type)) {
                                alertsMap.set(alert.symbol, existing + " | " + alert.alert_type.replace(/_/g, " "));
                            }
                        } else {
                            alertsMap.set(alert.symbol, alert.alert_type.replace(/_/g, " "));
                        }
                    });
                }

                document.getElementById('stat-alerts').textContent = alertData.count || 0;

                // Process volumes dict to array
                let sumCalls = 0;
                let sumPuts = 0;
                const vols = volData.data || {};

                const newLiveVolumes = [];
                for (const [symbol, metrics] of Object.entries(vols)) {
                    sumCalls += metrics.call_volume || 0;
                    sumPuts += metrics.put_volume || 0;

                    newLiveVolumes.push({
                        symbol,
                        call_volume: metrics.call_volume || 0,
                        put_volume: metrics.put_volume || 0
                    });
                }

                liveVolumes = newLiveVolumes;

                // Update global stats
                document.getElementById('stat-total').textContent = liveVolumes.length;
                document.getElementById('stat-calls').textContent = formatNum(sumCalls);
                document.getElementById('stat-puts').textContent = formatNum(sumPuts);

                renderTable();

            } catch (err) {
                console.error("Error fetching data:", err);
                if (liveVolumes.length === 0) {
                    document.getElementById('dataTableBody').innerHTML = `
                        <tr>
                            <td colspan="4" class="px-6 py-6 text-center text-red-500">
                                ⚠️ Failed to connect to local server at ${API_BASE}. Make sure the Flask app is running.
                            </td>
                        </tr>
                    `;
                }
            }
        }

        // Render Table
        function renderTable() {
            const tbody = document.getElementById('dataTableBody');
            const searchStr = document.getElementById('searchInput').value.toLowerCase();

            // Filter
            let displayData = liveVolumes.filter(item =>
                item.symbol.toLowerCase().includes(searchStr)
            );

            // Sort
            displayData = sortData(displayData);

            if (displayData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-slate-500">No matching stocks found.</td></tr>`;
                return;
            }

            // Build HTML
            let html = '';
            for (const row of displayData) {
                const alertTypes = alertsMap.get(row.symbol) || "";
                const isAlert = alertsMap.has(row.symbol);
                const hasCallSpike = alertTypes.includes("CALL");
                const hasPutSpike = alertTypes.includes("PUT");

                const rowClass = isAlert ? 'bg-slate-800/80 alert-row' : '';

                const eod = eodVolumesMap.get(row.symbol) || { call: 0, put: 0 };

                const callBadge = hasCallSpike ? `<span class="ml-2 inline-flex items-center rounded bg-emerald-400/20 px-1.5 py-0.5 text-[10px] font-bold text-emerald-400 border border-emerald-400/30 shadow-[0_0_8px_rgba(52,211,153,0.3)] animate-pulse">2x SPIKE</span>` : '';
                const putBadge = hasPutSpike ? `<span class="ml-2 inline-flex items-center rounded bg-rose-400/20 px-1.5 py-0.5 text-[10px] font-bold text-rose-400 border border-rose-400/30 shadow-[0_0_8px_rgba(251,113,133,0.3)] animate-pulse">2x SPIKE</span>` : '';

                const alertMsg = isAlert
                    ? `<span class="inline-flex items-center rounded-md bg-amber-400/10 px-2.5 py-1 text-xs font-semibold text-amber-400 ring-1 ring-inset ring-amber-400/20">
                         ⚠️ ${alertTypes}
                       </span>`
                    : `<span class="text-slate-500 text-xs text-right block w-full">Normal</span>`;

                html += `
                    <tr class="${rowClass}">
                        <td class="px-6 py-3 whitespace-nowrap text-sm font-semibold text-white">
                            ${row.symbol}
                        </td>
                        <td class="px-6 py-3 whitespace-nowrap text-sm text-right tabular-data text-slate-400 font-medium">
                            ${formatNum(eod.call)}
                        </td>
                        <td class="px-6 py-3 whitespace-nowrap text-sm text-right tabular-data text-emerald-400/90 font-medium tracking-wide">
                            ${formatNum(row.call_volume)} ${callBadge}
                        </td>
                        <td class="px-6 py-3 whitespace-nowrap text-sm text-right tabular-data text-slate-400 font-medium">
                            ${formatNum(eod.put)}
                        </td>
                        <td class="px-6 py-3 whitespace-nowrap text-sm text-right tabular-data text-rose-400/90 font-medium tracking-wide">
                            ${formatNum(row.put_volume)} ${putBadge}
                        </td>
                        <td class="px-6 py-3 whitespace-nowrap text-sm text-right">
                            ${alertMsg}
                        </td>
                    </tr>
                `;
            }
            tbody.innerHTML = html;
        }

        // Search listener
        document.getElementById('searchInput').addEventListener('input', renderTable);

        // Start polling
        fetchAnalytics(); // initial
        setInterval(fetchAnalytics, 10000); // exactly 10s request
    </script>
</body>

</html>
