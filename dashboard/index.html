<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Options Analytics Dashboard</title>

    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        dark: '#0b1120',
                        card: '#1e293b',
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <style>
        body {
            background-color: theme('colors.dark');
            color: #f8fafc;
        }

        .tabular-data {
            font-variant-numeric: tabular-nums;
        }

        /* Pulse animation for alert rows — strong visibility */
        .alert-row {
            animation: alertPulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            border-left: 4px solid #ef4444;
        }

        @keyframes alertPulse {

            0%,
            100% {
                background-color: rgba(239, 68, 68, 0.10);
            }

            50% {
                background-color: rgba(239, 68, 68, 0.25);
            }
        }

        /* Alert icon glow */
        .glow-green {
            text-shadow: 0 0 6px rgba(52, 211, 153, 0.8);
        }

        .glow-red {
            text-shadow: 0 0 6px rgba(251, 113, 133, 0.8);
        }

        .glow-yellow {
            text-shadow: 0 0 6px rgba(251, 191, 36, 0.8);
            animation: yellowPulse 1.5s ease-in-out infinite;
        }

        @keyframes yellowPulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* Subtle transitions */
        tbody tr {
            transition: background-color 0.15s ease;
            border-left: 3px solid transparent;
        }

        tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.04);
        }

        /* Compact table */
        table {
            table-layout: fixed;
            width: 100%;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: theme('colors.dark');
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>

<body class="antialiased h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-card border-b border-slate-700/50 py-2 px-4 flex items-center justify-between shrink-0">
        <div class="flex items-center space-x-2">
            <div
                class="h-7 w-7 rounded-lg bg-indigo-500/20 flex items-center justify-center border border-indigo-500/30">
                <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                </svg>
            </div>
            <h1 class="text-base font-bold bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
                Options Live Analytics
            </h1>
        </div>

        <div class="flex items-center space-x-3">
            <!-- Last Token Date Badge -->
            <div id="tokenDateBadge"
                class="hidden text-[11px] font-medium flex items-center gap-1.5 px-2.5 py-1 rounded-lg border"
                style="background: rgba(30, 41, 59, 0.8);">
                <span id="tokenDateDot" class="inline-flex h-2 w-2 rounded-full bg-slate-500"></span>
                <span class="text-slate-400">Token:</span>
                <span id="tokenDateText" class="tabular-data text-slate-300">—</span>
            </div>

            <!-- Token Setup Button -->
            <a href="/setup" id="setupTokenBtn"
                class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200 border border-indigo-500/30 bg-indigo-500/10 text-indigo-400 hover:bg-indigo-500/20 hover:border-indigo-500/50 hover:text-indigo-300 hover:shadow-lg hover:shadow-indigo-500/10">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                </svg>
                Token Setup
            </a>

            <!-- Live Clock / Market Status -->
            <div id="marketStatusIndicator" class="text-xs font-medium text-slate-400 flex items-center">
                <span id="liveStatusDot" class="relative flex h-2 w-2 mr-1.5">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                <span id="liveStatusText">LIVE</span> <span id="clock" class="ml-1.5 tabular-data">--:--:--</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-auto p-3">
        <div class="max-w-full mx-auto space-y-3">

            <!-- Stats overview cards - compact, no gaps -->
            <div class="grid grid-cols-5 gap-2">
                <div class="bg-card rounded-lg p-3 border border-slate-700/50">
                    <div class="text-[10px] text-slate-400 font-medium uppercase tracking-wide">Monitored</div>
                    <div class="text-lg font-bold tabular-data" id="stat-total">0</div>
                </div>
                <div class="bg-card rounded-lg p-3 border border-slate-700/50">
                    <div class="text-[10px] text-slate-400 font-medium uppercase tracking-wide">Total Calls</div>
                    <div class="text-lg font-bold tabular-data text-emerald-400" id="stat-calls">0</div>
                </div>
                <div class="bg-card rounded-lg p-3 border border-slate-700/50">
                    <div class="text-[10px] text-slate-400 font-medium uppercase tracking-wide">Total Puts</div>
                    <div class="text-lg font-bold tabular-data text-rose-400" id="stat-puts">0</div>
                </div>
                <div class="bg-card rounded-lg p-3 border border-slate-700/50">
                    <div class="text-[10px] text-slate-400 font-medium uppercase tracking-wide">Alerts</div>
                    <div class="text-lg font-bold tabular-data text-amber-400" id="stat-alerts">0</div>
                </div>
                <div class="bg-card rounded-lg p-3 border border-slate-700/50">
                    <div class="text-[10px] text-slate-400 font-medium uppercase tracking-wide">Put &gt; Call</div>
                    <div class="text-lg font-bold tabular-data text-yellow-400" id="stat-put-alerts">0</div>
                </div>
            </div>

            <!-- Market Closed Banner (hidden by default) -->
            <div id="marketClosedBanner"
                class="hidden bg-amber-500/10 border border-amber-500/30 rounded-lg px-4 py-2 flex items-center gap-2">
                <span class="text-amber-400 text-sm">⏸</span>
                <span class="text-amber-300 text-xs font-medium">Market Closed</span>
                <span class="text-slate-400 text-xs">— Showing last trading day data</span>
                <span id="marketClosedDate" class="text-amber-400 text-xs font-mono"></span>
            </div>

            <!-- Table Container -->
            <div class="bg-card rounded-lg border border-slate-700/50 overflow-hidden flex flex-col">
                <div class="px-3 py-2 border-b border-slate-700/50 flex justify-between items-center bg-slate-800/50">
                    <h2 id="tableTitle" class="text-sm font-semibold text-white">Live EOD Totals (ATM ±10)</h2>
                    <div class="relative">
                        <svg class="w-3.5 h-3.5 absolute left-2.5 top-2 text-slate-400" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                        <input type="text" id="searchInput" placeholder="Search..."
                            class="bg-slate-900 border border-slate-700 text-xs rounded-md focus:ring-indigo-500 focus:border-indigo-500 block w-40 pl-7 py-1.5 pr-2 text-white placeholder-slate-500">
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs whitespace-nowrap">
                        <thead class="text-xs text-slate-400 uppercase bg-slate-800/80 sticky top-0 z-10">
                            <tr>
                                <th class="px-3 py-2 font-semibold cursor-pointer hover:text-white"
                                    onclick="sortTable('symbol')">Stock ↓</th>
                                <th class="px-2 py-2 font-semibold text-right">Prev CE</th>
                                <th id="colLiveCE"
                                    class="px-2 py-2 font-semibold text-right cursor-pointer hover:text-white"
                                    onclick="sortTable('call_volume')">Live CE ↕</th>
                                <th class="px-2 py-2 font-semibold text-right">Prev PE</th>
                                <th id="colLivePE"
                                    class="px-2 py-2 font-semibold text-right cursor-pointer hover:text-white"
                                    onclick="sortTable('put_volume')">Live PE ↕</th>
                                <th class="px-2 py-2 font-semibold text-center cursor-pointer hover:text-white"
                                    onclick="sortTable('alert')" title="CE 2x | PE 2x | Put>Call">Alerts ↕</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody" class="divide-y divide-slate-800/50">
                            <tr>
                                <td colspan="6" class="px-3 py-8 text-center text-slate-500">
                                    <svg class="animate-spin h-6 w-6 mx-auto text-indigo-500 mb-2"
                                        xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                            stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor"
                                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                        </path>
                                    </svg>
                                    Connecting to live data...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        // API Base configuration
        const API_BASE = window.location.origin + '/api';

        // Application State
        let liveVolumes = [];
        let alertsMap = new Map();
        let eodVolumesMap = new Map();
        let eodLoaded = false;
        let sortColumn = 'symbol';
        let sortAsc = true;

        const formatNum = (num) => new Intl.NumberFormat('en-IN').format(num || 0);

        // Fetch and display token status
        async function fetchTokenStatus() {
            try {
                const res = await fetch(`${API_BASE}/token/status`);
                if (!res.ok) return;
                const data = await res.json();

                const badge = document.getElementById('tokenDateBadge');
                const dot = document.getElementById('tokenDateDot');
                const text = document.getElementById('tokenDateText');

                if (data.last_token_date) {
                    badge.classList.remove('hidden');

                    if (data.has_valid_token) {
                        // Token is valid for today
                        dot.className = 'inline-flex h-2 w-2 rounded-full bg-emerald-500';
                        badge.style.borderColor = 'rgba(52, 211, 153, 0.3)';
                        text.className = 'tabular-data text-emerald-400';
                        text.textContent = data.last_token_date + ' ✓';
                    } else {
                        // Token exists but not for today (stale)
                        dot.className = 'inline-flex h-2 w-2 rounded-full bg-amber-500';
                        badge.style.borderColor = 'rgba(251, 191, 36, 0.3)';
                        text.className = 'tabular-data text-amber-400';
                        text.textContent = data.last_token_date + ' (stale)';
                    }
                } else {
                    badge.classList.remove('hidden');
                    dot.className = 'inline-flex h-2 w-2 rounded-full bg-rose-500';
                    badge.style.borderColor = 'rgba(251, 113, 133, 0.3)';
                    text.className = 'tabular-data text-rose-400';
                    text.textContent = 'No token';
                }
            } catch (err) {
                console.warn('Could not fetch token status:', err);
            }
        }

        // Fetch token status on load
        fetchTokenStatus();

        // Update live clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: false });
        }, 1000);

        // Sorting logic
        window.sortTable = (col) => {
            if (sortColumn === col) {
                sortAsc = !sortAsc;
            } else {
                sortColumn = col;
                sortAsc = col === 'symbol' ? true : false;
            }
            renderTable();
        };

        const INDICES = ["NIFTY", "BANKNIFTY", "FINNIFTY", "MIDCPNIFTY", "SENSEX"];

        const sortData = (data) => {
            return [...data].sort((a, b) => {
                let valA, valB;

                if (sortColumn === 'symbol') {
                    const aIsIndex = INDICES.includes(a.symbol);
                    const bIsIndex = INDICES.includes(b.symbol);
                    if (aIsIndex && !bIsIndex) return sortAsc ? -1 : 1;
                    if (!aIsIndex && bIsIndex) return sortAsc ? 1 : -1;
                    valA = a.symbol;
                    valB = b.symbol;
                } else if (sortColumn === 'call_volume') {
                    valA = a.call_volume;
                    valB = b.call_volume;
                } else if (sortColumn === 'put_volume') {
                    valA = a.put_volume;
                    valB = b.put_volume;
                } else if (sortColumn === 'alert') {
                    // Score: count how many alert indicators are active
                    const aAlerts = alertsMap.get(a.symbol) || "";
                    const bAlerts = alertsMap.get(b.symbol) || "";
                    valA = (aAlerts.includes("CALL") ? 1 : 0) + (aAlerts.includes("PUT") ? 1 : 0) + (a.put_volume > a.call_volume ? 1 : 0);
                    valB = (bAlerts.includes("CALL") ? 1 : 0) + (bAlerts.includes("PUT") ? 1 : 0) + (b.put_volume > b.call_volume ? 1 : 0);
                }

                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });
        };

        // Fetch Data from Server
        async function fetchAnalytics() {
            try {
                if (!eodLoaded) {
                    try {
                        const eodRes = await fetch(`${API_BASE}/eod-volumes`);
                        if (eodRes.ok) {
                            const eodJson = await eodRes.json();
                            if (eodJson.data) {
                                eodJson.data.forEach(item => {
                                    eodVolumesMap.set(item.symbol, {
                                        call: item.call_volume_total || 0,
                                        put: item.put_volume_total || 0
                                    });
                                });
                            }
                        }
                        eodLoaded = true;
                    } catch (eodErr) {
                        console.warn("Could not load EOD data", eodErr);
                    }
                }

                const [volRes, alertRes] = await Promise.all([
                    fetch(`${API_BASE}/live-volumes`),
                    fetch(`${API_BASE}/alerts`)
                ]);

                if (!volRes.ok) throw new Error("Volume API Failed");

                const volData = await volRes.json();
                const alertData = alertRes.ok ? await alertRes.json() : { data: [] };

                // Handle market closed state
                const isMarketClosed = volData.market_closed === true;
                const banner = document.getElementById('marketClosedBanner');
                const statusDot = document.getElementById('liveStatusDot');
                const statusText = document.getElementById('liveStatusText');
                const tableTitle = document.getElementById('tableTitle');
                const colLiveCE = document.getElementById('colLiveCE');
                const colLivePE = document.getElementById('colLivePE');

                if (isMarketClosed) {
                    banner.classList.remove('hidden');
                    if (volData.data_date) {
                        document.getElementById('marketClosedDate').textContent = `(${volData.data_date})`;
                    }
                    // Update header indicator
                    statusDot.innerHTML = '<span class="relative inline-flex rounded-full h-2 w-2 bg-amber-500"></span>';
                    statusText.textContent = 'CLOSED';
                    statusText.className = 'text-amber-400';
                    // Update table headers
                    tableTitle.textContent = `Last Trading Day Volume (ATM ±10)${volData.data_date ? ' — ' + volData.data_date : ''}`;
                    colLiveCE.innerHTML = `${volData.data_date || 'Prev'} CE ↕`;
                    colLivePE.innerHTML = `${volData.data_date || 'Prev'} PE ↕`;
                } else {
                    banner.classList.add('hidden');
                    statusDot.innerHTML = '<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>';
                    statusText.textContent = 'LIVE';
                    statusText.className = '';
                    tableTitle.textContent = 'Live EOD Totals (ATM ±10)';
                    colLiveCE.innerHTML = 'Live CE ↕';
                    colLivePE.innerHTML = 'Live PE ↕';
                }

                alertsMap.clear();
                if (alertData.data) {
                    alertData.data.forEach(alert => {
                        let existing = alertsMap.get(alert.symbol);
                        if (existing) {
                            if (!existing.includes(alert.alert_type)) {
                                alertsMap.set(alert.symbol, existing + " | " + alert.alert_type.replace(/_/g, " "));
                            }
                        } else {
                            alertsMap.set(alert.symbol, alert.alert_type.replace(/_/g, " "));
                        }
                    });
                }

                document.getElementById('stat-alerts').textContent = alertData.count || 0;

                let sumCalls = 0;
                let sumPuts = 0;
                const vols = volData.data || {};

                const newLiveVolumes = [];
                for (const [symbol, metrics] of Object.entries(vols)) {
                    sumCalls += metrics.call_volume || 0;
                    sumPuts += metrics.put_volume || 0;

                    newLiveVolumes.push({
                        symbol,
                        call_volume: metrics.call_volume || 0,
                        put_volume: metrics.put_volume || 0
                    });
                }

                liveVolumes = newLiveVolumes;

                const putDominantCount = liveVolumes.filter(v => v.put_volume > v.call_volume).length;

                document.getElementById('stat-total').textContent = liveVolumes.length;
                document.getElementById('stat-calls').textContent = formatNum(sumCalls);
                document.getElementById('stat-puts').textContent = formatNum(sumPuts);
                document.getElementById('stat-put-alerts').textContent = putDominantCount;

                renderTable();

            } catch (err) {
                console.error("Error fetching data:", err);
                if (liveVolumes.length === 0) {
                    document.getElementById('dataTableBody').innerHTML = `
                        <tr>
                            <td colspan="6" class="px-3 py-6 text-center text-red-500 text-xs">
                                ⚠️ Failed to connect to server at ${API_BASE}
                            </td>
                        </tr>
                    `;
                }
            }
        }

        // Render Table
        function renderTable() {
            const tbody = document.getElementById('dataTableBody');
            const searchStr = document.getElementById('searchInput').value.toLowerCase();

            let displayData = liveVolumes.filter(item =>
                item.symbol.toLowerCase().includes(searchStr)
            );

            displayData = sortData(displayData);

            if (displayData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-3 py-6 text-center text-slate-500 text-xs">No matching stocks found.</td></tr>`;
                return;
            }

            let html = '';
            for (const row of displayData) {
                const alertTypes = alertsMap.get(row.symbol) || "";
                const isAlert = alertsMap.has(row.symbol);
                const hasCallSpike = alertTypes.includes("CALL");
                const hasPutSpike = alertTypes.includes("PUT");
                const putGtCall = row.put_volume > row.call_volume;

                const rowClass = (isAlert || putGtCall) ? 'alert-row' : '';

                const eod = eodVolumesMap.get(row.symbol) || { call: 0, put: 0 };

                // Build alert icons side by side in one cell
                let alertIcons = [];
                if (hasCallSpike) alertIcons.push(`<span class="glow-green text-emerald-400" title="Call 2x Spike">●</span>`);
                if (hasPutSpike) alertIcons.push(`<span class="glow-red text-rose-400" title="Put 2x Spike">●</span>`);
                if (putGtCall) alertIcons.push(`<span class="glow-yellow text-yellow-400" title="Put > Call">⚠</span>`);
                const alertCell = alertIcons.length > 0
                    ? alertIcons.join(' ')
                    : `<span class="text-slate-600">–</span>`;

                html += `
                    <tr class="${rowClass}">
                        <td class="px-3 py-2 text-sm font-semibold text-white truncate">${row.symbol}</td>
                        <td class="px-2 py-2 text-sm text-right tabular-data text-white font-medium">${formatNum(eod.call)}</td>
                        <td class="px-2 py-2 text-sm text-right tabular-data text-emerald-400 font-medium">${formatNum(row.call_volume)}</td>
                        <td class="px-2 py-2 text-sm text-right tabular-data text-white font-medium">${formatNum(eod.put)}</td>
                        <td class="px-2 py-2 text-sm text-right tabular-data text-rose-400 font-medium">${formatNum(row.put_volume)}</td>
                        <td class="px-2 py-2 text-center text-base">${alertCell}</td>
                    </tr>
                `;
            }
            tbody.innerHTML = html;
        }

        // Search listener
        document.getElementById('searchInput').addEventListener('input', renderTable);

        // Start polling
        fetchAnalytics();
        setInterval(fetchAnalytics, 10000);
    </script>
</body>

</html>
