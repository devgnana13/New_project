<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OI Analysis Dashboard</title>

    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        dark: '#0b1120',
                        card: '#1e293b',
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <style>
        body {
            background-color: theme('colors.dark');
            color: #f8fafc;
        }

        .tabular-data {
            font-variant-numeric: tabular-nums;
        }

        .alert-row {
            animation: alertPulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            border-left: 4px solid #ef4444;
        }

        @keyframes alertPulse {

            0%,
            100% {
                background-color: rgba(239, 68, 68, 0.10);
            }

            50% {
                background-color: rgba(239, 68, 68, 0.25);
            }
        }

        tbody tr {
            transition: background-color 0.15s ease;
            cursor: pointer;
        }

        tbody tr.main-row:hover {
            background-color: rgba(255, 255, 255, 0.04);
        }

        .sub-table-container {
            overflow: hidden;
            transition: max-height 0.3s ease-in-out;
            max-height: 0;
            background-color: #0f172a;
        }

        .expanded .sub-table-container {
            max-height: 800px;
            padding: 1rem;
            border-bottom: 1px solid #334155;
        }

        .drop-alert {
            color: #ef4444;
            font-weight: bold;
            animation: flash 1s infinite alternate;
        }

        @keyframes flash {
            from {
                opacity: 1;
            }

            to {
                opacity: 0.5;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: theme('colors.dark');
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>

<body class="antialiased h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-card border-b border-slate-700/50 py-2 px-4 flex items-center justify-between shrink-0">
        <div class="flex items-center space-x-4">
            <h1 class="text-base font-bold bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
                Options Live Analytics
            </h1>
            <nav class="flex space-x-2">
                <a href="/"
                    class="px-3 py-1.5 text-xs font-medium rounded-md text-slate-400 hover:text-white hover:bg-slate-800 transition">Volume
                    Board</a>
                <a href="/oi"
                    class="px-3 py-1.5 text-xs font-semibold rounded-md bg-indigo-500/20 text-indigo-300 border border-indigo-500/30">OI
                    Analysis</a>
            </nav>
        </div>

        <div class="flex items-center space-x-3">
            <div id="marketStatusIndicator" class="text-xs font-medium text-slate-400 flex items-center">
                <span id="liveStatusDot" class="relative flex h-2 w-2 mr-1.5">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                <span id="liveStatusText">LIVE</span> <span id="clock" class="ml-1.5 tabular-data">--:--:--</span>
            </div>
            <button onclick="fetchAnalytics()"
                class="bg-slate-700 hover:bg-slate-600 text-white p-1 rounded transition text-xs">
                🔄 Refresh
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-auto p-4">
        <div class="max-w-7xl mx-auto space-y-4">

            <!-- Table Container -->
            <div class="bg-card rounded-lg border border-slate-700/50 flex flex-col">
                <div class="px-4 py-3 border-b border-slate-700/50 flex justify-between items-center bg-slate-800/50">
                    <h2 class="text-sm font-semibold text-white">Open Interest (OI) Analysis — Top 11 Strikes (ATM ±5)
                    </h2>
                    <div class="relative">
                        <svg class="w-4 h-4 absolute left-2.5 top-1.5 text-slate-400" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                        <input type="text" id="searchInput" placeholder="Search Symbol..."
                            class="bg-slate-900 border border-slate-700 text-xs rounded-md focus:ring-indigo-500 block w-48 pl-8 py-1.5 text-white">
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="text-xs text-slate-400 uppercase bg-slate-800/80">
                            <tr>
                                <th class="px-4 py-3 font-semibold">Stock Symbol</th>
                                <th class="px-4 py-3 font-semibold text-right">Chg in CE OI</th>
                                <th class="px-4 py-3 font-semibold text-right">Total Call OI</th>
                                <th class="px-4 py-3 font-semibold text-right">Total Put OI</th>
                                <th class="px-4 py-3 font-semibold text-right">Chg in PE OI</th>
                                <th class="px-4 py-3 font-semibold text-center">Active Alerts (±5 Strikes)</th>
                                <th class="px-4 py-3 font-semibold text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody" class="divide-y divide-slate-800/50 relative">
                            <tr>
                                <td colspan="5" class="px-4 py-8 text-center text-slate-500">Connecting to live OI
                                    data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        const API_BASE = window.location.origin + '/api';
        let oiDataList = [];
        let expandedRows = new Set();
        const formatNum = (num) => new Intl.NumberFormat('en-IN').format(num || 0);

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: false });
        }, 1000);

        function toggleRow(symbol) {
            if (expandedRows.has(symbol)) {
                expandedRows.delete(symbol);
            } else {
                expandedRows.add(symbol);
            }
            renderTable();
        }

        async function fetchAnalytics() {
            try {
                const res = await fetch(`${API_BASE}/oi-data`);
                if (!res.ok) throw new Error("API Failed");
                const data = await res.json();

                // Format data
                oiDataList = [];
                for (let symbol in data.data) {
                    oiDataList.push(data.data[symbol]);
                }

                renderTable();
            } catch (err) {
                console.error("Error fetching OI data:", err);
            }
        }

        function getCentralStrikes(strikesObj) {
            const keys = Object.keys(strikesObj).map(Number).sort((a, b) => a - b);
            if (keys.length === 0) return { keys: [], middleIndex: -1 };

            const middleIndex = Math.floor(keys.length / 2);
            const start = Math.max(0, middleIndex - 5);
            const end = Math.min(keys.length, middleIndex + 6);

            return {
                keys: keys.slice(start, end),
                allKeys: keys,
                middleIndex
            };
        }

        function renderTable() {
            const tbody = document.getElementById('dataTableBody');
            const searchStr = document.getElementById('searchInput').value.toLowerCase();

            let displayData = oiDataList.filter(item => item.symbol.toLowerCase().includes(searchStr));

            // Sort by symbol
            displayData.sort((a, b) => a.symbol.localeCompare(b.symbol));

            if (displayData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-4 py-8 text-center text-slate-500">No matching stocks found.</td></tr>`;
                return;
            }

            let html = '';
            for (const row of displayData) {
                // Determine central strikes
                const central = getCentralStrikes(row.strikes || {});
                const strikeKeys = central.keys;
                const centralStr = strikeKeys.map(String);

                // Filter alerts strictly for these central strikes
                const activeAlerts = (row.alerts || []).filter(a => centralStr.includes(String(a.strike)));
                const hasCEDrop = activeAlerts.some(a => a.type === "CE_OI_DROP");
                const hasCESpike = activeAlerts.some(a => a.type === "CE_OI_SPIKE");
                const hasPEDrop = activeAlerts.some(a => a.type === "PE_OI_DROP");
                const hasPESpike = activeAlerts.some(a => a.type === "PE_OI_SPIKE");

                const isAlertRow = hasCEDrop || hasCESpike || hasPEDrop || hasPESpike;

                let alertBadges = [];
                if (hasCEDrop) alertBadges.push(`<span class="px-2 py-0.5 bg-rose-500/20 text-rose-400 border border-rose-500/30 rounded text-[11px] font-bold">CE OI Drop <-100</span>`);
                if (hasCESpike) alertBadges.push(`<span class="px-2 py-0.5 bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 rounded text-[11px] font-bold">CE OI Spike >100</span>`);
                if (hasPEDrop) alertBadges.push(`<span class="px-2 py-0.5 bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 rounded text-[11px] font-bold">PE OI Drop <-100</span>`);
                if (hasPESpike) alertBadges.push(`<span class="px-2 py-0.5 bg-purple-500/20 text-purple-400 border border-purple-500/30 rounded text-[11px] font-bold">PE OI Spike >100</span>`);

                const badgesHtml = alertBadges.length > 0 ? alertBadges.join(' ') : '<span class="text-slate-600">—</span>';
                const isExpanded = expandedRows.has(row.symbol);

                html += `
                    <tr class="main-row ${isAlertRow ? 'alert-row' : ''} border-b border-slate-700/50" onclick="toggleRow('${row.symbol}')">
                        <td class="px-4 py-3 font-semibold text-white">${row.symbol}</td>
                        <td class="px-4 py-3 text-right tabular-data ${row.call_oi_chg > 0 ? 'text-emerald-500' : 'text-slate-400'}">${row.call_oi_chg > 0 ? '+' : ''}${formatNum(row.call_oi_chg)}</td>
                        <td class="px-4 py-3 text-right tabular-data text-emerald-400">${formatNum(row.call_oi)}</td>
                        <td class="px-4 py-3 text-right tabular-data text-amber-400">${formatNum(row.put_oi)}</td>
                        <td class="px-4 py-3 text-right tabular-data ${row.put_oi_chg > 0 ? 'text-emerald-500' : 'text-slate-400'}">${row.put_oi_chg > 0 ? '+' : ''}${formatNum(row.put_oi_chg)}</td>
                        <td class="px-4 py-3 text-center">${badgesHtml}</td>
                        <td class="px-4 py-3 text-center text-slate-400">
                            <button class="text-xs hover:text-white transition rounded px-2 py-1 bg-slate-800">
                                ${isExpanded ? 'Collapse ▲' : 'Expand ▼'}
                            </button>
                        </td>
                    </tr>
                `;

                // Subtable
                if (isExpanded) {
                    let subTableRows = '';
                    strikeKeys.forEach(k => {
                        const sData = row.strikes[String(k)] || row.strikes[k];
                        const ceDrop = sData.ce_oi_chg <= -100;
                        const peDrop = sData.pe_oi_chg <= -100;

                        subTableRows += `
                            <tr class="hover:bg-slate-800/50">
                                <td class="px-4 py-2 text-right tabular-data ${ceDrop ? 'drop-alert' : (sData.ce_oi_chg > 0 ? 'text-emerald-500' : 'text-slate-400')}">${sData.ce_oi_chg > 0 ? '+' : ''}${formatNum(sData.ce_oi_chg)}</td>
                                <td class="px-4 py-2 text-right tabular-data text-emerald-300/80">${formatNum(sData.ce_oi)}</td>
                                <td class="px-4 py-2 font-mono text-xs text-white text-center bg-slate-800/80">${k}</td>
                                <td class="px-4 py-2 text-right tabular-data text-amber-300/80">${formatNum(sData.pe_oi)}</td>
                                <td class="px-4 py-2 text-right tabular-data ${peDrop ? 'drop-alert' : (sData.pe_oi_chg > 0 ? 'text-emerald-500' : 'text-slate-400')}">${sData.pe_oi_chg > 0 ? '+' : ''}${formatNum(sData.pe_oi_chg)}</td>
                            </tr>
                        `;
                    });

                    if (strikeKeys.length === 0) {
                        subTableRows = `<tr><td colspan="5" class="py-4 text-center text-slate-500 text-xs">No strike data available</td></tr>`;
                    }

                    html += `
                        <tr class="bg-card">
                            <td colspan="7" class="p-0 border-b border-slate-700/50">
                                <div class="sub-table-container ${isExpanded ? 'expanded' : ''} bg-slate-900/50 p-4 shadow-inner border-y border-slate-800">
                                    <table class="w-full text-left text-xs bg-slate-800/30 rounded border border-slate-700/50">
                                        <thead class="text-slate-400 border-b border-slate-700/50">
                                            <tr>
                                                <th class="px-4 py-2 font-semibold text-right">Chg in CE OI</th>
                                                <th class="px-4 py-2 font-semibold text-right">Live CE OI</th>
                                                <th class="px-4 py-2 font-semibold text-center">Strike Price</th>
                                                <th class="px-4 py-2 font-semibold text-right">Live PE OI</th>
                                                <th class="px-4 py-2 font-semibold text-right">Chg in PE OI</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-slate-700/50">
                                            ${subTableRows}
                                        </tbody>
                                    </table>
                                </div>
                            </td>
                        </tr>
                    `;
                }
            }
            tbody.innerHTML = html;
        }

        document.getElementById('searchInput').addEventListener('input', renderTable);
        fetchAnalytics();
        setInterval(fetchAnalytics, 10000);
    </script>
</body>

</html>
