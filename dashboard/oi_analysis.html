<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live OI Analytics Dashboard</title>

    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        dark: '#0b1120',
                        card: '#1e293b',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: theme('colors.dark');
            color: #f8fafc;
        }

        .tabular-data {
            font-variant-numeric: tabular-nums;
        }

        .alert-row {
            animation: alertPulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            border-left: 4px solid #ef4444;
        }

        @keyframes alertPulse {
            0%, 100% { background-color: rgba(239, 68, 68, 0.10); }
            50% { background-color: rgba(239, 68, 68, 0.25); }
        }

        .glow-green { text-shadow: 0 0 6px rgba(52, 211, 153, 0.8); }
        .glow-red { text-shadow: 0 0 6px rgba(251, 113, 133, 0.8); }

        tbody tr.main-row {
            transition: background-color 0.15s ease;
            border-left: 3px solid transparent;
            cursor: pointer;
        }

        tbody tr.main-row:hover {
            background-color: rgba(255, 255, 255, 0.04);
        }

        .details-row {
            display: none;
            background-color: #0f172a;
        }

        .details-row.expanded {
            display: table-row;
        }

        table {
            table-layout: fixed;
            width: 100%;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: theme('colors.dark'); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>

<body class="antialiased h-screen flex flex-col overflow-hidden">
    <header class="bg-card border-b border-slate-700/50 py-2 px-4 flex items-center justify-between shrink-0">
        <div class="flex items-center space-x-2">
            <h1 class="text-base font-bold bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">
                OI Chng Analytics Dashboard
            </h1>
        </div>
        <div class="flex items-center space-x-3">
            <a href="/" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200 border border-slate-500/30 bg-slate-500/10 text-slate-400 hover:bg-slate-500/20 hover:text-white">
                Back to Volume Dashboard
            </a>
            <div class="text-xs font-medium text-slate-400 flex items-center">
                <span id="clock" class="ml-1.5 tabular-data">--:--:--</span>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-auto p-3">
        <div class="max-w-full mx-auto space-y-3">
            <div class="bg-card rounded-lg border border-slate-700/50 overflow-hidden flex flex-col">
                <div class="px-3 py-2 border-b border-slate-700/50 flex justify-between items-center bg-slate-800/50">
                    <h2 class="text-sm font-semibold text-white">Live OI Totals (ATM ±5)</h2>
                    <input type="text" id="searchInput" placeholder="Search Symbol..."
                        class="bg-slate-900 border border-slate-700 text-xs rounded-md focus:ring-indigo-500 focus:border-indigo-500 block w-40 px-2 py-1.5 text-white">
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs whitespace-nowrap">
                        <thead class="text-xs text-slate-400 uppercase bg-slate-800/80 sticky top-0 z-10">
                            <tr>
                                <th class="px-3 py-2 font-semibold w-1/4">Stock ↓</th>
                                <th class="px-2 py-2 font-semibold text-center w-1/4">Alerts (CE / PE)</th>
                                <th class="px-2 py-2 font-semibold text-right w-1/4">Total CE Chng (±5)</th>
                                <th class="px-2 py-2 font-semibold text-right w-1/4">Total PE Chng (±5)</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody" class="divide-y divide-slate-800/50">
                            <tr>
                                <td colspan="4" class="px-3 py-8 text-center text-slate-500">
                                    Connecting to live OI data...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = window.location.origin + '/api';
        let oiDataMap = new Map();
        let expandedSymbol = null;

        const formatNum = (num) => new Intl.NumberFormat('en-IN').format(num || 0);

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: false });
        }, 1000);

        function toggleExpand(symbol) {
            if (expandedSymbol === symbol) {
                expandedSymbol = null; // collapse
            } else {
                expandedSymbol = symbol;
            }
            renderTable();
        }

        async function fetchOI() {
            try {
                const res = await fetch(`${API_BASE}/live-oi`);
                if (!res.ok) throw new Error("API Failed");
                const json = await res.json();
                
                if (json.data) {
                    oiDataMap.clear();
                    for (const [sym, data] of Object.entries(json.data)) {
                        oiDataMap.set(sym, data);
                    }
                    renderTable();
                }
            } catch (err) {
                console.error("Error fetching OI data:", err);
            }
        }

        function renderTable() {
            const tbody = document.getElementById('dataTableBody');
            const searchStr = document.getElementById('searchInput').value.toLowerCase();

            let symbols = Array.from(oiDataMap.keys()).filter(sym => sym.toLowerCase().includes(searchStr)).sort();

            if (symbols.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="px-3 py-6 text-center text-slate-500">No matching stocks found.</td></tr>`;
                return;
            }

            let html = '';
            for (const sym of symbols) {
                const data = oiDataMap.get(sym);
                const atmStrike = data.atm_strike;
                let strikesArr = Object.keys(data.strikes || {}).map(Number).sort((a,b) => a-b);
                
                // Find ATM index
                let atmIdx = strikesArr.indexOf(atmStrike);
                if (atmIdx === -1) {
                    // Fallback to nearest if exact not found
                    let minDiff = Infinity;
                    strikesArr.forEach((s, i) => {
                        let diff = Math.abs(s - atmStrike);
                        if (diff < minDiff) { minDiff = diff; atmIdx = i; }
                    });
                }
                
                // get 11 strikes: +- 5 
                let middleStrikes = [];
                if (atmIdx !== -1) {
                    let startIdx = Math.max(0, atmIdx - 5);
                    let endIdx = Math.min(strikesArr.length - 1, atmIdx + 5);
                    middleStrikes = strikesArr.slice(startIdx, endIdx + 1);
                } else {
                    middleStrikes = strikesArr; // fallback
                }

                let ceAlert = false;
                let peAlert = false;
                let totalCeChng = 0;
                let totalPeChng = 0;

                let strikeRowsHtml = '';

                // Generate inner breakdown table rows
                for (const s of middleStrikes) {
                    const strK = String(s);
                    const sData = data.strikes[strK] || {};
                    const ceChng = sData.ce_chng || 0;
                    const peChng = sData.pe_chng || 0;

                    // ALERT CONDITION: <-100 drop or >100 build up
                    if (Math.abs(ceChng) > 100) ceAlert = true;
                    if (Math.abs(peChng) > 100) peAlert = true;

                    totalCeChng += ceChng;
                    totalPeChng += peChng;

                    const isAtm = (s === atmStrike);
                    const rowBg = isAtm ? 'bg-indigo-900/40 text-indigo-200' : 'bg-slate-800/40 text-slate-300';

                    strikeRowsHtml += `
                        <tr class="${rowBg} border-t border-slate-700/50">
                            <td class="px-4 py-1 text-right text-xs ${ceChng > 0 ? 'text-emerald-400' : 'text-rose-400'}">${formatNum(ceChng)}</td>
                            <td class="px-4 py-1 text-center font-mono ${isAtm ? 'font-bold' : ''}">${s}</td>
                            <td class="px-4 py-1 text-left text-xs ${peChng > 0 ? 'text-emerald-400' : 'text-rose-400'}">${formatNum(peChng)}</td>
                        </tr>
                    `;
                }

                const alertClasses = (ceAlert || peAlert) ? "alert-row" : "";
                const ceIcon = ceAlert ? '<span class="glow-green text-emerald-400 font-bold mx-1">CE⚠</span>' : '';
                const peIcon = peAlert ? '<span class="glow-red text-rose-400 font-bold mx-1">PE⚠</span>' : '';
                
                // Main Row
                html += `
                    <tr class="main-row ${alertClasses}" onclick="toggleExpand('${sym}')">
                        <td class="px-3 py-2 text-sm font-semibold text-white whitespace-nowrap">
                            <span class="inline-block w-4">${expandedSymbol === sym ? '▼' : '▶'}</span> ${sym}
                        </td>
                        <td class="px-2 py-2 text-center text-sm">${ceIcon} ${peIcon}</td>
                        <td class="px-2 py-2 text-right tabular-data text-sm font-medium ${totalCeChng >= 0 ? 'text-emerald-400' : 'text-rose-400'}">${formatNum(totalCeChng)}</td>
                        <td class="px-2 py-2 text-right tabular-data text-sm font-medium ${totalPeChng >= 0 ? 'text-emerald-400' : 'text-rose-400'}">${formatNum(totalPeChng)}</td>
                    </tr>
                `;

                // Details Row
                html += `
                    <tr class="details-row ${expandedSymbol === sym ? 'expanded' : ''}">
                        <td colspan="4" class="p-0 border-t border-slate-700/20">
                            <div class="px-4 py-3 bg-slate-900 overflow-hidden shadow-inner">
                                <h3 class="text-xs uppercase text-slate-500 font-semibold mb-2">Options Chain Breakdown (ATM ±5) - ${sym}</h3>
                                <div class="flex justify-center">
                                    <table class="w-1/2 min-w-[300px] border border-slate-700/50 rounded-lg overflow-hidden">
                                        <thead class="bg-slate-800 text-slate-400 text-xs text-center border-b border-slate-700/50">
                                            <tr>
                                                <th class="py-1 px-4 text-right border-r border-slate-700/50">CE Chng</th>
                                                <th class="py-1 px-4 text-center border-r border-slate-700/50 w-24">Strike</th>
                                                <th class="py-1 px-4 text-left">PE Chng</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${strikeRowsHtml}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </td>
                    </tr>
                `;
            }
            tbody.innerHTML = html;
        }

        document.getElementById('searchInput').addEventListener('input', renderTable);

        fetchOI();
        setInterval(fetchOI, 5000);
    </script>
</body>
</html>
